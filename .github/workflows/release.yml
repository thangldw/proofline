name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild without moving it
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Resolve immutable tag on main
        id: tagged_source
        run: |
          git fetch origin main --no-tags
          tag_sha=$(git rev-list -n 1 "$RELEASE_TAG")
          test "$(git rev-parse HEAD)" = "$tag_sha"
          git merge-base --is-ancestor "$tag_sha" origin/main
          echo "sha=$tag_sha" >> "$GITHUB_OUTPUT"

      - name: Scan tagged source for credentials
        uses: trufflesecurity/trufflehog@v3.93.6
        with:
          base: ""
          head: ${{ steps.tagged_source.outputs.sha }}
          extra_args: --results=verified,unknown --fail-on-scan-errors

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e '.[dev]'
          npm ci
          npx playwright install --with-deps chromium

      - name: Verify release metadata
        run: .venv/bin/python scripts/release_check.py --tag "$RELEASE_TAG"

      - name: Run release gates
        run: |
          make test
          make check
          npm run test:e2e

      - name: Build release assets
        run: |
          .venv/bin/python -m build --outdir release-dist
          npm run build:web
          tar -czf "release-dist/proofline-web-${RELEASE_TAG}.tar.gz" -C apps/web/dist .
          cd release-dist
          sha256sum proofline-* > SHA256SUMS

      - name: Smoke test clean wheel install
        run: |
          python -m venv /tmp/proofline-release-smoke
          /tmp/proofline-release-smoke/bin/pip install release-dist/*.whl
          /tmp/proofline-release-smoke/bin/proofline --version
          PROOFLINE_DATABASE_URL=sqlite:////tmp/proofline-release-smoke.db \
            /tmp/proofline-release-smoke/bin/proofline seed

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: "proofline-${{ env.RELEASE_TAG }}"
          path: |
            release-dist/*
            docs/releases/${{ env.RELEASE_TAG }}.md
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@v4
        with:
          name: "proofline-${{ env.RELEASE_TAG }}"
          path: release-bundle

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(--verify-tag --title "$RELEASE_TAG" \
            --notes-file "release-bundle/docs/releases/$RELEASE_TAG.md")
          if [[ "$RELEASE_TAG" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "$RELEASE_TAG" release-bundle/release-dist/* \
            --repo "$GITHUB_REPOSITORY" "${args[@]}"
