name: API CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "evals/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "deploy/**"
      - "scripts/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "evals/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "deploy/**"
      - "scripts/**"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'

      - name: Lint API
        run: |
          ruff check apps/api
          ruff format --check apps/api

      - name: Test API
        run: |
          pytest -q apps/api

      - name: Credential-free evaluation gates
        run: |
          proofline eval --dataset evals/retrieval/seed-v1.json \
            --min-recall 0.80 --min-ndcg 0.80
          proofline eval-grounded --dataset evals/grounded-qa/seed-v1.json \
            --min-citation-resolution 1.0 --min-citation-precision 1.0 \
            --min-grounded-success 1.0 --min-status-accuracy 1.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Test web application
        run: npm run test:web

      - name: Build web application
        run: npm run build:web

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build --file deploy/docker/api.Dockerfile --tag proofline-api:ci .

  platform-smoke:
    name: Platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run local evidence and recovery smoke
        env:
          PROOFLINE_AI_PROVIDER: disabled
          PROOFLINE_EMBEDDING_PROVIDER: disabled
          PROOFLINE_ALLOW_REMOTE_AI: "false"
        run: python scripts/platform_smoke.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build web application
        run: |
          npm ci
          npm run build:web
