name: API CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "docs/**"
      - "evals/**"
      - "README.md"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "deploy/**"
      - "scripts/**"
      - "spec/**"
      - "Makefile"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "docs/**"
      - "evals/**"
      - "README.md"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "deploy/**"
      - "scripts/**"
      - "spec/**"
      - "Makefile"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-e2e:
    name: Browser E2E (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install local API
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run credential-free browser vertical slice
        env:
          PROOFLINE_AI_PROVIDER: disabled
          PROOFLINE_EMBEDDING_PROVIDER: disabled
          PROOFLINE_ALLOW_REMOTE_AI: "false"
        run: npm run test:e2e

  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'

      - name: Lint API
        run: |
          ruff check apps/api
          ruff format --check apps/api

      - name: Test API
        run: |
          pytest -q apps/api

      - name: Verify decision story and read-only CI contract
        env:
          PROOFLINE_HOME: ${{ runner.temp }}/proofline-decision-check
          PROOFLINE_AI_PROVIDER: disabled
          PROOFLINE_EMBEDDING_PROVIDER: disabled
          PROOFLINE_ALLOW_REMOTE_AI: "false"
        run: |
          proofline seed
          before_sha256="$(sha256sum "$PROOFLINE_HOME/proofline.db")"
          proofline check-decisions
          after_sha256="$(sha256sum "$PROOFLINE_HOME/proofline.db")"
          test "$before_sha256" = "$after_sha256"
          proofline demo stale-decision \
            --output-dir "${{ runner.temp }}/proofline-stale-decision"
          proofline verify-package \
            "${{ runner.temp }}/proofline-stale-decision/evidence.zip"
          test -s "${{ runner.temp }}/proofline-stale-decision/report.html"
          proofline verify-package \
            spec/decision-evidence-package/v1/test-vectors/valid-minimal.json

      - name: Credential-free evaluation gates
        run: |
          proofline eval-extraction --dataset evals/extraction/seed-v1.json \
            --min-precision 1.0 --min-recall 1.0 --min-f1 1.0 \
            --min-evidence-resolution 1.0 --min-expected-evidence-accuracy 1.0 \
            --min-negative-source-accuracy 1.0
          proofline eval --dataset evals/retrieval/seed-v2.json \
            --min-recall 1.0 --min-ndcg 1.0 --min-expected-empty-accuracy 1.0
          proofline eval-grounded --dataset evals/grounded-qa/seed-v1.json \
            --min-citation-resolution 1.0 --min-citation-precision 1.0 \
            --min-grounded-success 1.0 --min-status-accuracy 1.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Test web application
        run: npm run test:web

      - name: Build web application
        run: npm run build:web

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build --file deploy/docker/api.Dockerfile --tag proofline-api:ci .

  platform-smoke:
    name: Platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run local evidence and recovery smoke
        env:
          PROOFLINE_AI_PROVIDER: disabled
          PROOFLINE_EMBEDDING_PROVIDER: disabled
          PROOFLINE_ALLOW_REMOTE_AI: "false"
        run: python scripts/platform_smoke.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build web application
        run: |
          npm ci
          npm run build:web
