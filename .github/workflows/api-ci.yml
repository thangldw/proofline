name: API CI

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "evals/**"
      - "pyproject.toml"
      - "deploy/**"
      - ".github/workflows/api-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "evals/**"
      - "pyproject.toml"
      - "deploy/**"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'

      - name: Lint API
        run: |
          ruff check apps/api
          ruff format --check apps/api

      - name: Test API
        run: |
          pytest -q apps/api

      - name: Retrieval evaluation gate
        run: |
          proofline eval --dataset evals/retrieval/seed-v1.json \
            --min-recall 0.80 --min-ndcg 0.80

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Test web application
        run: npm run test:web

      - name: Build web application
        run: npm run build:web

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build --file deploy/docker/api.Dockerfile --tag proofline-api:ci .
