name: proofline

services:
  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      PROOFLINE_ASGI_APP: ${PROOFLINE_ASGI_APP:-proofline.main:app}
      PROOFLINE_HOST: 0.0.0.0
      PROOFLINE_PORT: 8000
      PROOFLINE_HEALTH_PATH: ${PROOFLINE_HEALTH_PATH:-/health}
      PROOFLINE_DATABASE_URL: sqlite:////data/proofline.db
      PROOFLINE_AI_PROVIDER: ${PROOFLINE_AI_PROVIDER:-disabled}
      PROOFLINE_AI_BASE_URL: ${PROOFLINE_AI_BASE_URL:-}
      PROOFLINE_AI_MODEL: ${PROOFLINE_AI_MODEL:-}
      PROOFLINE_AI_API_KEY: ${PROOFLINE_AI_API_KEY:-}
      PROOFLINE_EMBEDDING_PROVIDER: ${PROOFLINE_EMBEDDING_PROVIDER:-disabled}
      PROOFLINE_EMBEDDING_BASE_URL: ${PROOFLINE_EMBEDDING_BASE_URL:-}
      PROOFLINE_EMBEDDING_MODEL: ${PROOFLINE_EMBEDDING_MODEL:-}
      PROOFLINE_EMBEDDING_API_KEY: ${PROOFLINE_EMBEDDING_API_KEY:-}
      PROOFLINE_ALLOW_REMOTE_AI: ${PROOFLINE_ALLOW_REMOTE_AI:-false}
      PROOFLINE_IMPORT_ROOTS: ${PROOFLINE_IMPORT_ROOTS:-}
      PROOFLINE_FOLDER_WATCH_INTERVAL_SECONDS: ${PROOFLINE_FOLDER_WATCH_INTERVAL_SECONDS:-0}
    ports:
      - "${PROOFLINE_API_BIND:-127.0.0.1}:${PROOFLINE_API_PORT:-8000}:8000"
    init: true
    restart: unless-stopped
    volumes:
      - proofline-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000' + os.getenv('PROOFLINE_HEALTH_PATH', '/health'), timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  proofline-data:
